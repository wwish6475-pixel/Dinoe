name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Install Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip
          unzip -q Godot_v4.2.2-stable_linux.x86_64.zip
          mv Godot_v4.2.2-stable_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot
      - name: Install Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz
          unzip -q Godot_v4.2.2-stable_export_templates.tpz
          mv templates/android_debug.apk ~/.local/share/godot/export_templates/4.2.2.stable/
          mv templates/android_release.apk ~/.local/share/godot/export_templates/4.2.2.stable/
      - name: Export APK
        run: |
          mkdir -p build
          cat > export_presets.cfg << 'EOF'
          [preset.0]
          name="Android"
          platform="Android"
          runnable=true
          export_path="build/DinoRush.apk"
          [preset.0.options]
          keystore/debug="$ANDROID_HOME/debug.keystore"
          keystore/debug_user="androiddebugkey"
          keystore/debug_password="android"
          permissions/internet=true
          package/unique_name="com.wwish.dinorush"
          package/name="Dino Rush"
          EOF
          godot --headless --export-debug "Android" build/DinoRush.apk || true
      - uses: actions/upload-artifact@v4
        with:
          name: DinoRush-APK
          path: build/DinoRush.apk
