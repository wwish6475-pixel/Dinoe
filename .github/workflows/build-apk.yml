name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Install Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip
          unzip -q Godot_v4.2.2-stable_linux.x86_64.zip
          sudo mv Godot_v4.2.2-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
      - name: Install Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz
          unzip -q Godot_v4.2.2-stable_export_templates.tpz -d tpl
          cp tpl/templates/android_debug.apk ~/.local/share/godot/export_templates/4.2.2.stable/
          cp tpl/templates/android_release.apk ~/.local/share/godot/export_templates/4.2.2.stable/
      - name: Create export_presets.cfg
        run: |
          mkdir -p build
          printf '[preset.0]\nname="Android"\nplatform="Android"\nrunnable=true\nexport_path="build/DinoRush.apk"\n\n[preset.0.options]\nkeystore/debug="%s/debug.keystore"\nkeystore/debug_user="androiddebugkey"\nkeystore/debug_password="android"\npermissions/internet=true\npackage/unique_name="com.wwish.dinorush"\npackage/name="Dino Rush"\narchitectures/armeabi-v7a=true\narchitectures/arm64-v8a=true\n' "$ANDROID_HOME" > export_presets.cfg
      - name: Export APK
        run: |
          godot --headless --export-debug "Android" build/DinoRush.apk
          ls -la build/
      - uses: actions/upload-artifact@v4
        with:
          name: DinoRush-APK
          path: build/DinoRush.apk
